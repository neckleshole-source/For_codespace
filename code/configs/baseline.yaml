# Baseline config for the FREUID pipeline.
# Edit values or pass --config path/to/other.yaml to train.py.

data:
  train_csv: dataset/train.csv
  test_csv: dataset/test.csv
  dataset_root: dataset
  image_size: 160          # backbone-native-ish; 128 is faster on CPU.
  batch_size: 32
  val_fraction: 0.2
  seed: 42
  num_workers: 0           # increase on a GPU box

model:
  backbone: convnext_tiny.fb_in1k
  pretrained: true
  drop_rate: 0.1

optim:
  lr: 3.0e-4
  weight_decay: 0.05
  warmup_epochs: 1
  epochs: 8
  grad_clip: 1.0
  ema_decay: 0.999
  amp: true                # autocast; no-op on CPU.
  amp_dtype: bf16          # use "fp16" on older GPUs without bf16.

ckpt:
  out_dir: runs/baseline
  save_best: true
  log_every: 10
